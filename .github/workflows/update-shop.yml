name: Update Shop from Google Sheets

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  update-shop:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Fetch Google Sheets data
        run: |
          curl -L "https://docs.google.com/spreadsheets/d/1GzF-SRTxDUey7gWkdiLICGOJwUZBwXmZ1BsBeGqZO5I/gviz/tq?tqx=out:csv&sheet=Sheet1" -o products.csv
          echo "Products fetched successfully"

      - name: Commit and push if changed
        run: |
          git config user.email "smj@srimahaganapathijewellers.com"
          git config user.name "SMJ Auto Update"
          git add products.csv
          git diff --staged --quiet || git commit -m "Auto update products from Google Sheets"
          git push
